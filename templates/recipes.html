<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Recipe Box — Feed Demo</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <style>
      :root {
        --paper: #f5ead6;
        --paper-2: #efe1c4;
        --ink: #2e2a24;
        --sage: #6e8b74;
        --brick: #b84c3e;
        --mustard: #d6a24c;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Work Sans", sans-serif;
      }

      .feed-header {
        max-width: 900px;
        margin: 0 auto 2.5rem;
        text-align: center;
      }
      .feed-header .eyebrow {
        font-family: "Space Mono", monospace;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: var(--brick);
      }
      .feed-header h1 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        font-size: 2.1rem;
        margin: 0.4rem 0 0.3rem;
      }
      .feed-header p {
        color: #6b6154;
        margin: 0;
      }

      .recipe-grid {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.75rem;
      }

      /* ---- Recipe card: styled like an index card in a recipe box ---- */
      .recipe-card {
        position: relative;
        background: var(--paper-2);
        border-radius: 4px;
        padding-left: 26px;
        cursor: pointer;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(46, 42, 36, 0.12);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      .recipe-card:hover,
      .recipe-card:focus-visible {
        transform: translateY(-4px);
        box-shadow: 0 10px 22px rgba(46, 42, 36, 0.18);
      }
      .recipe-card:focus-visible {
        outline: 2px solid var(--sage);
        outline-offset: 2px;
      }

      /* the "binder" strip: dashed thread + three rivets, like a card punched into a recipe box */
      .binder {
        position: absolute;
        left: 12px;
        top: 14px;
        bottom: 14px;
        width: 2px;
        border-left: 2px dashed rgba(184, 76, 62, 0.55);
      }
      .binder span {
        position: absolute;
        left: -4px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--brick);
        box-shadow: 0 0 0 2px var(--paper-2);
      }
      .binder span:nth-child(1) {
        top: 6%;
      }
      .binder span:nth-child(2) {
        top: 48%;
      }
      .binder span:nth-child(3) {
        top: 90%;
      }

      .card-photo {
        height: 150px;
        background-size: cover;
        background-position: center;
        border-radius: 3px;
        margin: 14px 14px 0 0;
      }
      .card-body {
        padding: 12px 14px 16px 0;
      }

      .card-tag {
        display: inline-block;
        font-family: "Space Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--sage);
        color: #fff;
        padding: 0.15rem 0.5rem;
        border-radius: 20px;
        margin-bottom: 0.5rem;
      }
      .card-title {
        font-family: "Space Mono", monospace;
        font-size: 1.02rem;
        font-weight: 700;
        line-height: 1.3;
        margin: 0 0 0.35rem;
      }
      .card-meta {
        font-size: 0.82rem;
        color: #7a7061;
      }

      /* ---- Modal: the "opened" recipe card ---- */
      .recipe-modal-content {
        background: var(--paper);
        border: none;
        border-radius: 6px;
        overflow: hidden;
      }
      .modal-close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        z-index: 5;
        background: rgba(46, 42, 36, 0.55);
        color: #fff;
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 1.3rem;
        line-height: 1;
        cursor: pointer;
      }
      .modal-banner {
        height: 240px;
        background-size: cover;
        background-position: center;
      }
      .modal-inner {
        padding: 1.75rem 2rem 2rem;
      }
      .modal-inner .card-tag {
        margin-bottom: 0.75rem;
      }
      .modal-inner h2 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }
      .modal-inner .card-meta {
        margin-bottom: 1.25rem;
      }

      .modal-columns {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 2rem;
      }
      @media (max-width: 576px) {
        .modal-columns {
          grid-template-columns: 1fr;
        }
      }

      .modal-inner h3 {
        font-family: "Space Mono", monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--brick);
        margin-bottom: 0.75rem;
      }
      .ingredient-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .ingredient-list li {
        padding: 0.35rem 0;
        border-bottom: 1px dashed #d8c9a8;
        font-size: 0.93rem;
      }
      .steps-list {
        padding-left: 1.1rem;
        margin: 0;
      }
      .steps-list li {
        padding: 0.3rem 0;
        font-size: 0.93rem;
      }
    </style>

    <script
      src="https://kit.fontawesome.com/fce603bd4c.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="p-3">
      <div class="container">
        <div
          class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
        >
          <a
            href="/"
            class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none"
          >
            <svg
              class="bi me-2"
              width="40"
              height="32"
              role="img"
              aria-label="Bootstrap"
            >
              <use xlink:href="#bootstrap"></use>
            </svg>
          </a>
          <ul
            class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
          >
            <li>
              <a href="/" class="nav-link px-2 text-dark">Home</a>
            </li>
            <li>
              <a href="recipes" class="nav-link px-2 text-secondary">Recipes</a>
            </li>
            <li>
              <a href="about" class="nav-link px-2 text-dark">About</a>
            </li>
          </ul>

          <!-- <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
          <input
            type="search"
            class="form-control form-control-dark text-bg-dark"
            placeholder="Search..."
            aria-label="Search"
          />
        </form> -->
          <div class="text-end">
            <a href="/login" class="btn me-2">Login</a>
            <a href="/signup" class="btn btn-extra">Sign-up</a>
          </div>
        </div>
      </div>
    </header>

    <div class="feed-header">
      <div class="eyebrow">Case Study 10</div>
      <h1>The Recipe Box</h1>
      <p>Click a card to open the full recipe.</p>
    </div>

    <!-- <h1>Recipes page</h1> -->

    <main class="recipe-grid" id="recipeGrid"></main>

    <!-- Bootstrap modal shell — content gets filled in by JS on click -->
    <div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content recipe-modal-content">
          <button
            type="button"
            class="modal-close-btn"
            data-bs-dismiss="modal"
            aria-label="Close"
          >
            &times;
          </button>
          <div id="modalBody"></div>
        </div>
      </div>
    </div>

    <div class="container px-4 py-5" id="custom-cards">
      <h2 class="pb-2 border-bottom">DISCOVER RECIPES BY CATEGORY</h2>

      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-4 align-items-stretch g-3 py-5"
      >
        <div class="col">
          <div
            class="card card-cover h-100 overflow-hidden border border-light-subtle border-2 rounded-4 d-flex"
          >
            <div class="d-flex flex-column align-items-center py-2">
              <div class="fit-data cate-box bg-success-subtle">
                <i class="fa-solid fa-bowl-food text-success"></i>
              </div>

              <div class="text-shadow-1 mt-3">
                <h3 class="display-6 lh-1 fw-normal fs-4">All</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="col">
          <div
            class="card card-cover h-100 overflow-hidden border border-light-subtle border-2 rounded-4"
          >
            <div class="d-flex flex-column align-items-center py-2">
              <div class="fit-data cate-box bg-danger-subtle">
                <i class="fa-solid fa-pizza-slice text-danger"></i>
              </div>

              <div class="fit-data text-shadow-1 mt-3">
                <h3 class="display-6 lh-1 fw-normal fs-4">Lunch</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="col">
          <div
            class="card card-cover h-100 overflow-hidden border border-light-subtle border-2 rounded-4"
          >
            <div class="d-flex flex-column align-items-center py-2">
              <div class="fit-data cate-box bg-primary-subtle">
                <i class="fa-solid fa-mug-saucer text-primary"></i>
              </div>

              <div class="text-shadow-1 fit-data mt-3">
                <h3 class="display-6 lh-1 fw-normal fs-4">Breakfast</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="col">
          <div
            class="card card-cover h-100 overflow-hidden border border-light-subtle border-2 rounded-4"
          >
            <div class="d-flex flex-column align-items-center py-2">
              <div class="fit-data cate-box bg-warning-subtle">
                <i class="fa-solid fa-utensils text-warning"></i>
              </div>

              <div class="text-shadow-1 fit-data mt-3">
                <h3 class="display-6 lh-1 fw-normal fs-4">Dinner</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <footer
        class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
      >
        <p class="col-md-4 mb-0 text-body-secondary">
           Group 10, Computer Studies 121
        </p>
        <a
          href="/"
          class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
          aria-label="Bootstrap"
        >
          <svg class="bi me-2" width="40" height="32" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
          </svg>
        </a>
      </footer>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="{{ url_for('static', filename='recipe.js') }}"></script>

    <!-- experimental data fetching on the recipe page -->

    <script src="{{ url_for('static', filename='js/recipes.js') }}"></script>
  </body>
</html>
