<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Recipe Box — Feed Demo</title>

    <!-- Bootstrap 5 (grid + modal component) -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --paper: #f5ead6;
        --paper-2: #efe1c4;
        --ink: #2e2a24;
        --sage: #6e8b74;
        --brick: #b84c3e;
        --mustard: #d6a24c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Work Sans", sans-serif;
        margin: 0;
        padding: 2.5rem 1.5rem 4rem;
      }

      .feed-header {
        max-width: 900px;
        margin: 0 auto 2.5rem;
        text-align: center;
      }
      .feed-header .eyebrow {
        font-family: "Space Mono", monospace;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: var(--brick);
      }
      .feed-header h1 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        font-size: 2.1rem;
        margin: 0.4rem 0 0.3rem;
      }
      .feed-header p {
        color: #6b6154;
        margin: 0;
      }

      .recipe-grid {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.75rem;
      }

      /* ---- Recipe card: styled like an index card in a recipe box ---- */
      .recipe-card {
        position: relative;
        background: var(--paper-2);
        border-radius: 4px;
        padding-left: 26px;
        cursor: pointer;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(46, 42, 36, 0.12);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }
      .recipe-card:hover,
      .recipe-card:focus-visible {
        transform: translateY(-4px);
        box-shadow: 0 10px 22px rgba(46, 42, 36, 0.18);
      }
      .recipe-card:focus-visible {
        outline: 2px solid var(--sage);
        outline-offset: 2px;
      }

      /* the "binder" strip: dashed thread + three rivets, like a card punched into a recipe box */
      .binder {
        position: absolute;
        left: 12px;
        top: 14px;
        bottom: 14px;
        width: 2px;
        border-left: 2px dashed rgba(184, 76, 62, 0.55);
      }
      .binder span {
        position: absolute;
        left: -4px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--brick);
        box-shadow: 0 0 0 2px var(--paper-2);
      }
      .binder span:nth-child(1) {
        top: 6%;
      }
      .binder span:nth-child(2) {
        top: 48%;
      }
      .binder span:nth-child(3) {
        top: 90%;
      }

      .card-photo {
        height: 150px;
        background-size: cover;
        background-position: center;
        border-radius: 3px;
        margin: 14px 14px 0 0;
      }
      .card-body {
        padding: 12px 14px 16px 0;
      }

      .card-tag {
        display: inline-block;
        font-family: "Space Mono", monospace;
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--sage);
        color: #fff;
        padding: 0.15rem 0.5rem;
        border-radius: 20px;
        margin-bottom: 0.5rem;
      }
      .card-title {
        font-family: "Space Mono", monospace;
        font-size: 1.02rem;
        font-weight: 700;
        line-height: 1.3;
        margin: 0 0 0.35rem;
      }
      .card-meta {
        font-size: 0.82rem;
        color: #7a7061;
      }

      /* ---- Modal: the "opened" recipe card ---- */
      .recipe-modal-content {
        background: var(--paper);
        border: none;
        border-radius: 6px;
        overflow: hidden;
      }
      .modal-close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        z-index: 5;
        background: rgba(46, 42, 36, 0.55);
        color: #fff;
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 1.3rem;
        line-height: 1;
        cursor: pointer;
      }
      .modal-banner {
        height: 240px;
        background-size: cover;
        background-position: center;
      }
      .modal-inner {
        padding: 1.75rem 2rem 2rem;
      }
      .modal-inner .card-tag {
        margin-bottom: 0.75rem;
      }
      .modal-inner h2 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }
      .modal-inner .card-meta {
        margin-bottom: 1.25rem;
      }

      .modal-columns {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 2rem;
      }
      @media (max-width: 576px) {
        .modal-columns {
          grid-template-columns: 1fr;
        }
      }

      .modal-inner h3 {
        font-family: "Space Mono", monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--brick);
        margin-bottom: 0.75rem;
      }
      .ingredient-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .ingredient-list li {
        padding: 0.35rem 0;
        border-bottom: 1px dashed #d8c9a8;
        font-size: 0.93rem;
      }
      .steps-list {
        padding-left: 1.1rem;
        margin: 0;
      }
      .steps-list li {
        padding: 0.3rem 0;
        font-size: 0.93rem;
      }
    </style>
  </head>
  <body>
    <div class="feed-header">
      <div class="eyebrow">Case Study 10</div>
      <h1>The Recipe Box</h1>
      <p>Click a card to open the full recipe.</p>
    </div>

    <!-- <h1>Recipes page</h1> -->

    <main class="recipe-grid" id="recipeGrid"></main>

    <!-- Bootstrap modal shell — content gets filled in by JS on click -->
    <div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content recipe-modal-content">
          <button
            type="button"
            class="modal-close-btn"
            data-bs-dismiss="modal"
            aria-label="Close"
          >
            &times;
          </button>
          <div id="modalBody"></div>
        </div>
      </div>
    </div>

    <script src="recipe.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
