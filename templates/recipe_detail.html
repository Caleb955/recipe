<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .recipe-modal-content {
        background: var(--paper);
        border: none;
        border-radius: 6px;
        overflow: hidden;
      }
      .modal-close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        z-index: 5;
        background: rgba(46, 42, 36, 0.55);
        color: #fff;
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 1.3rem;
        line-height: 1;
        cursor: pointer;
      }
      .modal-banner {
        height: 240px;
        background-size: cover;
        background-position: center;
      }
      .modal-inner {
        padding: 1.75rem 2rem 2rem;
      }
      .modal-inner .card-tag {
        margin-bottom: 0.75rem;
      }
      .modal-inner h2 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }
      .modal-inner .card-meta {
        margin-bottom: 1.25rem;
      }

      .modal-columns {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 2rem;
      }
      @media (max-width: 576px) {
        .modal-columns {
          grid-template-columns: 1fr;
        }
      }

      .modal-inner h3 {
        font-family: "Space Mono", monospace;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--brick);
        margin-bottom: 0.75rem;
      }
      .ingredient-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .ingredient-list li {
        padding: 0.35rem 0;
        border-bottom: 1px dashed #d8c9a8;
        font-size: 0.93rem;
      }
      .steps-list {
        padding-left: 1.1rem;
        margin: 0;
      }
      .steps-list li {
        padding: 0.3rem 0;
        font-size: 0.93rem;
      }
    </style>
  </head>
  <body>
    <div class="container js-container"></div>

    <script src="{{ url_for('static', filename='js/recipe_detail.js' ) }}"></script>
  </body>
</html>
