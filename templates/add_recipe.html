{% extends "base.html" %}
{% block title %}Add a Recipe{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 600px;">
  <h2 class="mb-4">Add a Recipe</h2>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/add-recipe">
    <div class="mb-3">
      <label class="form-label">Recipe Name</label>
      <input type="text" class="form-control" name="title" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <select class="form-select" name="category" required>
        <option value="" disabled selected>Choose a category</option>
        <option value="Breakfast">Breakfast</option>
        <option value="Lunch">Lunch</option>
        <option value="Dinner">Dinner</option>
        <option value="Soup">Soup</option>
        <option value="Pastries">Pastries</option>
        <option value="Snacks">Snacks</option>
        <option value="Dessert">Dessert</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Picture URL</label>
      <input type="url" class="form-control" name="image_url" placeholder="https://..." required />
    </div>

    <div class="mb-3">
      <label class="form-label">Time & Servings</label>
      <div class="d-flex gap-2">
        <input type="text" class="form-control" name="time_string" placeholder="30 min" required />
        <input type="text" class="form-control" name="servings" placeholder="Serves 4" required />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Ingredients (one per line)</label>
      <textarea class="form-control" name="ingredients" rows="5" required placeholder="1 cup flour&#10;2 eggs&#10;..."></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Directions (one step per line)</label>
      <textarea class="form-control" name="steps" rows="6" required placeholder="Preheat oven to 200°C&#10;Mix dry ingredients&#10;..."></textarea>
    </div>

    <button type="submit" class="btn btn-extra w-100">Upload Recipe</button>
  </form>
</div>
{% endblock %}
