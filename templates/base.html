<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Group 10 Recipes{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <script
      src="https://kit.fontawesome.com/fce603bd4c.js"
      crossorigin="anonymous"
    ></script>

    {% block extra_style %}{% endblock %}
  </head>
  <body>
    <header class="p-3">
      <div class="container">
        <div
          class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
        >
          <a
            href="/"
            class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none"
          >
            <svg
              class="bi me-2"
              width="40"
              height="32"
              role="img"
              aria-label="Bootstrap"
            >
              <use xlink:href="#bootstrap"></use>
            </svg>
          </a>
          <ul
            class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
          >
            <li>
              <a href="/" class="nav-link px-2 {{ 'text-secondary' if request.path == '/' else 'text-dark' }}">Home</a>
            </li>
            <li>
              <a href="/recipes" class="nav-link px-2 {{ 'text-secondary' if request.path == '/recipes' else 'text-dark' }}">Recipes</a>
            </li>
            <li>
              <a href="/about" class="nav-link px-2 {{ 'text-secondary' if request.path == '/about' else 'text-dark' }}">About</a>
            </li>
            {% if session.user %}
            <li>
              <a href="/add-recipe" class="btn btn-extra">+ Add Recipe</a>
            </li>
            {% endif %}
          </ul>

          <div class="text-end">
            {% if session.user %}
            <form action="/logout" method="post" class="d-inline">
              <button type="submit" class="btn">Logout</button>
            </form>
            {% else %}
            <a href="/login" class="btn me-2">Login</a>
            <a href="/signup" class="btn btn-extra">Sign-up</a>
            {% endif %}
          </div>
        </div>
      </div>
    </header>

    {% block content %}{% endblock %}

    <div class="container">
      <footer
        class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
      >
        <p class="col-md-4 mb-0 text-body-secondary">
           Group 10, Computer Studies 121.
        </p>
        <a
          href="/"
          class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
          aria-label="Bootstrap"
        >
          <svg class="bi me-2" width="40" height="32" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
          </svg>
        </a>
      </footer>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
